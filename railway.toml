[build]
builder = "nixpacks"
buildCommand = "curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH=\"$HOME/.local/bin:$PATH\" && cd server && uv sync"

[deploy]
startCommand = "export PATH=\"$HOME/.local/bin:$PATH\" && cd server && uv run uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
